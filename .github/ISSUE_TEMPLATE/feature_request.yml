name: Feature request
description: Suggest an improvement or new feature for the website
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.

        Please avoid suggesting features that require third-party tracking, analytics,
        or external fonts/scripts — the no-third-party-requests property is deliberate.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user need or scenario.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: more
    attributes:
      label: Additional context
